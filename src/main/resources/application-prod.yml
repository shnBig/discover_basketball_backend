  datasource:
    # 服务器本地3306端口（127.0.0.1比localhost更稳定）
    url: jdbc:mysql://127.0.0.1:3306/discover_basketball?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&tinyInt1isBit=false
    username: root
    password: "@Sunhaonan030323"  # 若生产环境密码不同，直接修改此处
    # 生产环境连接池配置（调大，适配高并发）
